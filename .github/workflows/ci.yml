name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Unit tests
        run: npm test
      - name: Fixture is up to date
        run: |
          node scripts/gen-fixture.mjs
          git diff --exit-code fixtures/claude-md.json
      - name: Demo runs (replay, free, offline)
        run: node bin/claudebench.mjs demo
